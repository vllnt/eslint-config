name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  check-version:
    name: Check Version
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_new_release: ${{ steps.meta.outputs.is_new_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "is_new_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION exists â€” canary only"
          else
            echo "is_new_release=true" >> "$GITHUB_OUTPUT"
            echo "No tag v$VERSION â€” new release"
          fi

  canary:
    name: Publish Canary
    needs: check-version
    if: needs.check-version.outputs.is_new_release == 'false'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Publish canary
        run: |
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          unset NODE_AUTH_TOKEN

          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          CANARY_VERSION="${BASE_VERSION}-canary.${SHORT_SHA}"
          npm version "$CANARY_VERSION" --no-git-tag-version
          npm publish --tag canary --provenance --access public

  release:
    name: Publish Release
    needs: check-version
    if: needs.check-version.outputs.is_new_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found && /^[[:space:]]*$/ && !printed { next }
            found { printed=1; print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::warning::No release notes found in CHANGELOG.md for v$VERSION"
            NOTES="Release v$VERSION"
          fi

          {
            echo "notes<<CHANGELOG_DELIM"
            echo "$NOTES"
            echo "CHANGELOG_DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Publish to npm
        run: |
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          unset NODE_AUTH_TOKEN
          npm publish --tag latest --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          gh release create "v$VERSION" \
            --title "@vllnt/eslint-config v$VERSION" \
            --notes "${{ steps.changelog.outputs.notes }}"
